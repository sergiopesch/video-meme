services:
  - type: web
    name: video-meme
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MAX_UPLOAD_SIZE
        value: 20971520
      - key: GIPHY_API_KEY
        sync: false
      - key: FONT_PATH
        value: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
